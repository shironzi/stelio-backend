spring.application.name=real_estate_app

# Database configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER}

# Cloud configuration
cloudflare.r2.bucket=${CLOUD_BUCKET_NAME}
cloudflare.r2.endpoint=${CLOUD_ENDPOINT}
cloudflare.r2.public-url=${CLOUD_PUBLIC_URL}
cloudflare.r2.access-key=${CLOUD_ACCESS_KEY}
cloudflare.r2.secret-key=${CLOUD_SECRET_KEY}

# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.maximum-pool-size=100
spring.datasource.hikari.minimum-idle=1

jwt.secret=${JWT_SECRET}
server.port=${PORT:8080}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

logging.level.root=ERROR
logging.level.com.example.real_estate_app=ERROR
logging.level.org.springframework.web=ERROR
logging.file.name=logs/app.log